<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Map</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <div id="canvas-container">
    <div id="viewport">
      <div id="canvas"></div>
    </div>
  </div>

  <div id="editor-panel" class="hidden">
    <div id="editor-header">
      <span id="editor-filename"></span>
      <button id="editor-close">&times;</button>
    </div>
    <div id="editor-body">
      <div id="editor-panes">
        <div class="editor-pane">
          <div class="pane-label">Markdown</div>
          <textarea id="editor-textarea" spellcheck="false"></textarea>
        </div>
        <div class="editor-pane">
          <div class="pane-label">Preview</div>
          <div id="editor-preview"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="topbar">
    <div id="dir-display">
      <span id="dir-icon">📁</span>
      <span id="dir-path"></span>
    </div>
    <button id="btn-new-file" title="Create new markdown file">+ New File</button>
  </div>

  <div id="toolbar">
    <button id="btn-zoom-in" title="Zoom In">+</button>
    <button id="btn-zoom-out" title="Zoom Out">−</button>
    <button id="btn-reset-view" title="Reset View">⌂</button>
    <span id="zoom-label">100%</span>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <span>New Markdown File</span>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body">
        <label for="modal-input">File name:</label>
        <input id="modal-input" type="text" value="untitled" placeholder="my-file" />
        <span id="modal-hint">.md will be added automatically</span>
      </div>
      <div id="modal-footer">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-confirm">Create</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden"></div>
</body>
</html>
